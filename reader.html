<!-- FÁJLNEV: reader.html -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magazin Player V1 - Olvasó</title>
    
    <!-- RETRÓ BETŰTÍPUS BEÁGYAZÁSA -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0f1014;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        #appBg {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            box-sizing: border-box;
        }
        /* ⭐ FINOMÍTOTT MOBIL MÉRET: Kicsit visszafogottabb felső sáv (46px) */
        #topBar {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 46px !important; display: flex; justify-content: flex-end; align-items: center;
            padding: 0 20px; box-sizing: border-box; background-color: #121318;
            z-index: 100;
        }
        #btnMenu {
            background: none; border: none; color: #9aa0a6;
            font-size: 26px; cursor: pointer; padding: 5px; line-height: 1;
        }
        /* ⭐ JAVÍTOTT: A belső terület hajszálpontosan a sávok közé szorul (46px fent, 54px lent) */
        #canvasViewport {
            position: relative; 
            overflow: hidden !important;
            display: flex; align-items: flex-start; justify-content: flex-start;
            box-sizing: border-box; width: 100%; flex-grow: 1;
            background-color: #000;
            margin-top: 46px;
            margin-bottom: 54px;
        }
        #comicImage {
            position: fixed; display: block;
            top: 0; left: 0;
            transform-origin: 0 0;
            opacity: 0.25;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #focusHighlight {
            position: fixed;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65); 
            border: 1px solid rgba(139, 90, 43, 0.5); 
            pointer-events: none;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: none;
            border-radius: 2px;
        }
        /* ⭐ FINOMÍTOTT MOBIL MÉRET: Kicsit visszafogottabb alsó sáv (54px) */
        #bottomBar {
            position: fixed; bottom: 0; left: 0;
            width: 100%; height: 54px !important; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            box-sizing: border-box; background-color: #121318;
            z-index: 100;
        }
        /* ⭐ FINOMÍTOTT MOBIL MÉRET: Kényelmes, de nem túl nagy gombok */
        .retro-btn {
            background: none; border: none; color: #f4f1ea;
            font-size: 24px; font-weight: bold; cursor: pointer; 
            padding: 10px 15px; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s ease;
            min-width: 44px; min-height: 44px;
        }
        .retro-btn.active { color: #8B5A2B; transform: scale(0.95); }

        /* ⭐ FIX: A szövegfiók fentről nyílik le, és SOHA nem takarja el az alsó menüt */
        #contentTextBox {
            position: absolute;
            top: 15px; left: 5%; width: 90%;
            background: rgba(15, 16, 20, 0.94);
            color: #f4f1ea;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid #8B5A2B;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 150;
            display: none;
            max-height: calc(100% - 30px);
            overflow-y: auto;
            white-space: pre-wrap; 
        }
    </style>
</head>
<body>

    <div id="appBg">
        <div id="topBar">
            <button id="btnMenu" title="Vissza a könyvtárba">☰</button>
        </div>

        <div id="canvasViewport">
            <img id="comicImage" src="" alt="Magazin Oldal">
            <div id="focusHighlight"></div>
            <div id="contentTextBox"></div>
        </div>

        <div id="bottomBar">
            <button id="btnTxt" class="retro-btn">📄</button>
            <button id="btnSound" class="retro-btn">🔊</button>
            <button id="btnPrev" class="retro-btn">◀</button>
            <button id="btnNext" class="retro-btn">▶</button>
        </div>
    </div>

    <audio id="bgAudioPlayer"></audio>

    // === 1. RÉSZ VÉGE (122 SOR) ===

       <script>
        let activeMagazineData = null;
        let currentFolder = "";
        let pageIdx = 0;   
        let blockIdx = -1; 
        let subWindowIdx = 0; 

        let txtActive = false;
        let soundActive = false;
        const audioPlayer = document.getElementById("bgAudioPlayer");

        function resetImageStyles() {
            const highlight = document.getElementById("focusHighlight");
            if (highlight) highlight.style.display = "none";
            const img = document.getElementById("comicImage");
            if (img) {
                img.style.transform = "none";
                img.style.opacity = "1";
            }
            subWindowIdx = 0;
        }

        function resizeLayout() {
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            
            const topBar = document.getElementById("topBar");
            const bottomBar = document.getElementById("bottomBar");
            const viewport = document.getElementById("canvasViewport");

            const barHeightTop = topBar ? topBar.offsetHeight : 46;
            const barHeightBottom = bottomBar ? bottomBar.offsetHeight : 54;
            const viewHeight = screenH - barHeightTop - barHeightBottom;

            if (viewport) viewport.style.height = viewHeight + "px";

            applyGuidedViewLogic(screenW, viewHeight);
        }

        function applyGuidedViewLogic(maxW, maxH) {
            const img = document.getElementById("comicImage");
            const highlight = document.getElementById("focusHighlight");
            const viewport = document.getElementById("canvasViewport");
            if (!img || !img.naturalWidth || !activeMagazineData) return;

            const nw = img.naturalWidth;
            const nh = img.naturalHeight;
            const currentPage = activeMagazineData.pages[pageIdx];
            const elements = currentPage.elements || [];

            updateTextAndAudio(elements[blockIdx]);

            const scaleX = maxW / nw;
            const scaleY = maxH / nh;
            const baseScale = Math.min(scaleX, scaleY);

            const barOffset = viewport.offsetTop;
            const initialX = viewport.offsetLeft + (maxW - (nw * baseScale)) / 2;
            const initialY = barOffset + (maxH - (nh * baseScale)) / 2;

            if (blockIdx === -1 || !elements[blockIdx]) {
                img.style.width = nw + "px";
                img.style.height = nh + "px";
                img.style.transformOrigin = "0 0";
                img.style.transform = `translate(${initialX}px, ${initialY}px) scale(${baseScale})`;
                highlight.style.display = "none";
            } else {
                highlight.style.display = "block";

                const block = elements[blockIdx];
                const bx1 = parseInt(block.x1) || 0; 
                const by1 = parseInt(block.y1) || 0;
                const bx2 = parseInt(block.x2) || nw; 
                const by2 = parseInt(block.y2) || nh;
                
                const bw = bx2 - bx1; 
                // ⭐ FIX: Tiszta, felülírásmentes magasságszámítás a JSON koordinátákból
                const bh = by2 - by1; 

                img.style.width = nw + "px";
                img.style.height = nh + "px";
                img.style.transformOrigin = "0 0";

                let zoom = 1;
                if (block.type === "Hasáb") {
                    zoom = maxW / (bw * baseScale);
                } else {
                    const zoomX = maxW / (bw * baseScale); 
                    const zoomY = maxH / (bh * baseScale);
                    zoom = Math.min(zoomX, zoomY) * 0.95;
                }

                const totalScale = baseScale * zoom;
                const moveX = viewport.offsetLeft + (maxW / 2) - ((bx1 + bw / 2) * totalScale);

                let moveY = barOffset - (by1 * totalScale);

                if (block.type === "Hasáb") {
                    const totalElementHeight = bh * totalScale;
                    
                    if (totalElementHeight > maxH) {
                        const overlapH = Math.floor(maxH * 0.05);
                        const stepSize = maxH - overlapH; 

                        let currentScrollY = subWindowIdx * stepSize;

                        // ⭐ FIX: Ha az utolsó ablakhoz érünk, centire pontosan a hasáb aljára húzza a képet
                        if (currentScrollY + maxH > totalElementHeight) {
                            currentScrollY = totalElementHeight - maxH;
                        }

                        moveY = barOffset - (by1 * totalScale) - currentScrollY;
                    }
                }

                img.style.transform = `translate(${moveX}px, ${moveY}px) scale(${totalScale})`;

                highlight.style.left = (bx1 * totalScale + moveX) + "px";
                highlight.style.top = (by1 * totalScale + moveY) + "px";
                highlight.style.width = (bw * totalScale) + "px";
                highlight.style.height = (bh * totalScale) + "px";
            }
        }


        // === 2. RÉSZ VÉGE (110 SOR) ===

                   function updateTextAndAudio(currentElement) {
            const textBox = document.getElementById("contentTextBox");
            
            if (txtActive && currentElement && currentElement.content && currentElement.content.trim() !== "") {
                textBox.innerText = currentElement.content;
                textBox.style.display = "block";
            } else {
                textBox.style.display = "none";
            }

            audioPlayer.pause();
            window.speechSynthesis.cancel();

            if (soundActive) {
                const currentPage = activeMagazineData.pages[pageIdx];
                const activeAudioPath = currentElement?.audioPath || currentPage?.audioPath;

                if (activeAudioPath && activeAudioPath.trim() !== "") {
                    const targetSrc = `magazines/${currentFolder}/${activeAudioPath}`;
                    if (!audioPlayer.src.includes(activeAudioPath)) {
                        audioPlayer.src = targetSrc;
                        audioPlayer.play().catch(e => console.log("Audio letiltva"));
                    }
                } else if (currentElement && currentElement.content && currentElement.content.trim() !== "") {
                    const utterance = new SpeechSynthesisUtterance(currentElement.content);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        function loadCurrentPage() {
            if (!activeMagazineData || !activeMagazineData.pages.length) return;
            const img = document.getElementById("comicImage");
            
            resetImageStyles();
            
            const pageData = activeMagazineData.pages[pageIdx];
            img.src = `magazines/${currentFolder}/${pageData.imagePath}`;
            
            img.onload = () => { 
                resizeLayout(); 
            };
        }

        window.addEventListener("resize", resizeLayout);

        window.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);
            currentFolder = params.get('magazine') || "orszag-vilag-1-export";

            try {
                const res = await fetch(`magazines/${currentFolder}/data.json`);
                activeMagazineData = await res.json();
                pageIdx = 0; blockIdx = -1;
                loadCurrentPage();
            } catch (e) { console.error("Hiba a data.json olvasásakor", e); }

            document.getElementById("btnMenu").onclick = () => { window.location.href = "index.html"; };

            document.getElementById("btnNext").onclick = () => {
                if (!activeMagazineData) return;
                const img = document.getElementById("comicImage");
                const viewport = document.getElementById("canvasViewport");
                const elements = activeMagazineData.pages[pageIdx].elements || [];
                
                if (blockIdx === -1) {
                    blockIdx++;
                    subWindowIdx = 0;
                    resizeLayout();
                    return;
                }

                const block = elements[blockIdx];
                // ⭐ FIX: Itt is hajszálpontosan számoljuk az elem valós magasságát
                const bh = (parseInt(block.y2) - parseInt(block.y1)) || 0;
                
                const screenH = viewport.clientHeight;
                const baseScale = Math.min(viewport.clientWidth / img.naturalWidth, screenH / img.naturalHeight);
                const zoom = block.type === "Hasáb" ? (viewport.clientWidth / (parseInt(block.x2 - block.x1) * baseScale)) : 1;
                const totalElementHeight = bh * baseScale * zoom;

                if (block.type === "Hasáb" && totalElementHeight > screenH) {
                    const overlapH = Math.floor(screenH * 0.05);
                    const stepSize = screenH - overlapH;

                    const nextScrollY = (subWindowIdx + 1) * stepSize;
                    const maxPossibleScrollY = totalElementHeight - screenH;
                    const currentScrollY = subWindowIdx * stepSize;

                    // ⭐ FIX: 5 pixel helyett 2 pixel biztonsági sávot hagyunk, hogy az utolsó sor is garantáltan beforduljon a kijelzőre
                    if (currentScrollY < maxPossibleScrollY - 2) {
                        if (nextScrollY < maxPossibleScrollY) {
                            subWindowIdx++;
                        } else {
                            subWindowIdx = maxPossibleScrollY / stepSize;
                        }
                        resizeLayout();
                        return; 
                    }
                }

                subWindowIdx = 0; 
                if (blockIdx < elements.length - 1) { 
                    blockIdx++; 
                    resizeLayout(); 
                } else if (pageIdx < activeMagazineData.pages.length - 1) { 
                    pageIdx++; 
                    blockIdx = -1; 
                    loadCurrentPage(); 
                }
            };

            document.getElementById("btnPrev").onclick = () => {
                if (!activeMagazineData) return;
                const viewport = document.getElementById("canvasViewport");
                const screenH = viewport.clientHeight;
                
                if (subWindowIdx > 0) {
                    subWindowIdx = Math.floor(subWindowIdx - 1);
                    if (subWindowIdx < 0) subWindowIdx = 0;
                    resizeLayout();
                } else {
                    subWindowIdx = 0; 
                    if (blockIdx > -1) { 
                        blockIdx--; 
                        resizeLayout(); 
                    } else if (pageIdx > 0) { 
                        pageIdx--; 
                        const p = activeMagazineData.pages[pageIdx]; 
                        blockIdx = p.elements?.length ? p.elements.length - 1 : -1; 
                        loadCurrentPage(); 
                    }
                }
            };

            document.getElementById("btnTxt").onclick = function() { 
                txtActive = !txtActive; 
                this.classList.toggle("active", txtActive); 
                resizeLayout(); 
            };
            
            document.getElementById("btnSound").onclick = function() { 
                soundActive = !soundActive; 
                this.classList.toggle("active", soundActive); 
                resizeLayout(); 
            };
        });
    </script>
</body>
</html>
